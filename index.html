<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>System Dynamics Network Flow IDE</title>
    <!-- CDN: Tailwind CSS v3, Alpine.js, expr-eval, js-yaml, Cytoscape.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/expr-eval@2.0.2/dist/bundle.min.js"></script>
    <!-- Замена YAML-парсера на js-yaml -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
</head>
<body class="bg-[#1e1e2e] text-[#cdd6f4] h-screen flex flex-col overflow-hidden text-xs antialiased p-2"
      x-data="ideController()" x-init="initStudio()">

    <!-- Шапка -->
    <header class="flex justify-between items-center border-b border-[#45475a] pb-1.5 mb-1.5 px-2">
        <div class="font-bold text-[#cba6f7] text-sm tracking-wide">📦 Network Flow DSL Studio: Медоуз & Влашин</div>
        <div class="flex gap-2">
            <button @click="compileAndRun()" class="bg-[#cba6f7] text-[#11111b] hover:opacity-90 font-bold px-3 py-1 rounded transition shadow cursor-pointer">
                🚀 Скомпилировать модель
            </button>
        </div>
    </header>

    <!-- Основная четырёхпанельная сетка -->
    <main class="flex-1 grid grid-cols-2 grid-rows-2 gap-2 overflow-hidden">
        
        <!-- ПАНЕЛЬ 1: Редактор DSL -->
        <div class="bg-[#252538] border border-[#45475a] rounded-lg p-3 flex flex-col overflow-hidden">
            <div class="text-[#cba6f7] font-semibold uppercase tracking-wider mb-2 border-b border-[#45475a] pb-1 flex justify-between">
                <span>Панель 1: Конфигурация Сети (YAML)</span>
                <span class="text-[10px] text-[#a6e3a1]">v3.0 Network Edition</span>
            </div>
            <textarea x-model="dslCode" class="flex-1 bg-[#11111b] text-[#a6e3a1] font-mono p-2 rounded resize-none border-none outline-none focus:ring-1 focus:ring-[#cba6f7]" spellcheck="false"></textarea>
        </div>

        <!-- ПАНЕЛЬ 2: Визуализация графа -->
        <div class="bg-[#252538] border border-[#45475a] rounded-lg p-3 flex flex-col overflow-hidden">
            <div class="text-[#cba6f7] font-semibold uppercase tracking-wider mb-2 border-b border-[#45475a] pb-1">
                Панель 2: Граф Системных Потоков (Cytoscape.js)
            </div>
            <div id="cy" class="flex-1 bg-[#11111b] rounded relative"></div>
        </div>

        <!-- ПАНЕЛЬ 3: Системный лог и аналитика -->
        <div class="bg-[#252538] border border-[#45475a] rounded-lg p-3 flex flex-col overflow-hidden">
            <div class="text-[#cba6f7] font-semibold uppercase tracking-wider mb-2 border-b border-[#45475a] pb-1">
                Панель 3: ROP Валидатор и Метрики Хакатона
            </div>
            <div class="flex-1 bg-[#11111b] font-mono p-2 rounded overflow-y-auto space-y-1.5">
                <template x-if="errors.length > 0">
                    <div class="text-[#f38ba8] font-bold">❌ Ошибки сетевой валидации (Влашин):</div>
                </template>
                <template x-for="err in errors">
                    <div class="text-[#f38ba8] pl-2" x-text="`• ${err}`"></div>
                </template>

                <template x-if="errors.length === 0">
                    <div class="text-[#a6e3a1] font-bold">✅ Сетевая структура валидна. Закон сохранения материи соблюдён.</div>
                </template>
                <div x-text="performanceText" class="text-[#94e2d5]"></div>
                
                <div class="mt-2 pt-2 border-t border-[#313244]" x-html="bottleneckAnalysis"></div>
            </div>
        </div>

        <!-- ПАНЕЛЬ 4: Таблица состояний -->
        <div class="bg-[#252538] border border-[#45475a] rounded-lg p-3 flex flex-col overflow-hidden">
            <div class="text-[#cba6f7] font-semibold uppercase tracking-wider mb-2 border-b border-[#45475a] pb-1">
                Панель 4: Таблица материального баланса по шагам времени
            </div>
            <div class="flex-1 overflow-auto bg-[#11111b] rounded">
                <table class="w-full text-left font-mono text-[11px]">
                    <thead class="bg-[#11111b] text-[#cba6f7] sticky top-0 border-b border-[#45475a]">
                        <tr>
                            <th class="p-1.5">Время</th>
                            <template x-for="name in activeStockNames">
                                <th class="p-1.5" x-text="name"></th>
                            </template>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="row in simulationData">
                            <tr class="border-b border-[#313244] hover:bg-[#181825]">
                                <td class="p-1.5 font-bold text-[#89b4fa]" x-text="`${row.time.toFixed(2)}ч`"></td>
                                <template x-for="name in activeStockNames">
                                    <td class="p-1.5" :class="row.state[name] > 150 ? 'text-[#f38ba8] font-bold' : 'text-[#cdd6f4]'" x-text="row.state[name].toFixed(1)"></td>
                                </template>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script>
// Глобальная переменная времени для макросов (PULSE, STEP, DELAY)
let currentT = 0;

// Класс-буфер для физического конвейера (задержки вещества)
class ConveyorBuffer {
    constructor(transitTime, dt) {
        this.transitTime = transitTime;
        this.dt = dt;
        this.queue = [];
    }
    push(amount, time) {
        this.queue.push({ releaseTime: time + this.transitTime, amount });
    }
    getReleaseAmount(time) {
        let total = 0;
        this.queue = this.queue.filter(item => {
            if (Math.abs(item.releaseTime - time) < 0.0001 || item.releaseTime <= time) {
                total += item.amount;
                return false;
            }
            return true;
        });
        return total;
    }
    clone() {
        let copy = new ConveyorBuffer(this.transitTime, this.dt);
        copy.queue = this.queue.map(i => ({ ...i }));
        return copy;
    }
}

// Контроллер Alpine.js для управления состоянием студии
function ideController() {
    return {
        dslCode: '',
        errors: [],
        performanceText: '',
        bottleneckAnalysis: '',
        simulationData: [],
        activeStockNames: [],
        cyInstance: null,

        initStudio() {
            // Дефолтная хакатон-модель СЦ
            this.dslCode = `settings:
  startTime: 0
  endTime: 12
  dt: 0.125

stocks:
  - name: "Ворота_Приемки"
    initial: 50.0
    type: "Stock"
  - name: "Сортировочный_Конвейер"
    initial: 0.0
    type: "Conveyor"
    transitTime: 1.0
  - name: "Зона_Сортировки"
    initial: 10.0
    type: "Stock"
  - name: "Зона_Отгрузки"
    initial: 0.0
    type: "Stock"

flows:
  - name: "Прибытие_Фур"
    from: "Внешний_Мир"
    to: "Ворота_Приемки"
    formula: "20 + PULSE(t, 200, 2) + PULSE(t, 100, 6)"
  - name: "Выкладка_на_Ленту"
    from: "Ворота_Приемки"
    to: "Сортировочный_Конвейер"
    formula: "MIN(Ворота_Приемки, 80)"
  - name: "Выход_с_Ленты"
    from: "Сортировочный_Конвейер"
    to: "Зона_Сортировки"
    type: "Transit_End"
  - name: "Процесс_Сортировки"
    from: "Зона_Сортировки"
    to: "Зона_Отгрузки"
    formula: "MIN(Зона_Сортировки, IF(Зона_Сортировки > 150, 25, 110))"
  - name: "Магистральный_Выезд"
    from: "Зона_Отгрузки"
    to: "Внешний_Мир"
    formula: "MIN(Зона_Отгрузки, 95)"`;

            // Инициализация пустого Cytoscape графа
            this.cyInstance = cytoscape({
                container: document.getElementById('cy'),
                style: [
                    { selector: 'node', style: { 'label': 'data(id)', 'color': '#cdd6f4', 'background-color': '#cba6f7', 'font-size': '10px', 'text-valign': 'center', 'text-halign': 'center', 'width': '80px', 'height': '30px', 'shape': 'round-rectangle' } },
                    { selector: 'node[type="Conveyor"]', style: { 'background-color': '#fab387', 'shape': 'rectangle', 'width': '100px' } },
                    { selector: 'node[type="Source"]', style: { 'background-color': '#11111b', 'border-width': '1px', 'border-color': '#45475a' } },
                    { selector: 'edge', style: { 'label': 'data(flowName)', 'font-size': '9px', 'color': '#a6e3a1', 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'target-arrow-color': '#45475a', 'line-color': '#45475a', 'width': 1.5 } }
                ],
                layout: { name: 'grid' }
            });

            // Автоматический запуск симуляции при загрузке
            setTimeout(() => this.compileAndRun(), 100);
        },

        compileAndRun() {
            this.errors = [];
            this.bottleneckAnalysis = '';
            this.performanceText = '';
            
            try {
                // Используем jsyaml.load вместо YAML.parse
                const rawYaml = jsyaml.load(this.dslCode);
                const compilation = this.validateNetwork(rawYaml);

                if (!compilation.success) {
                    this.errors = compilation.errors;
                    return;
                }

                this.activeStockNames = compilation.stocks.map(s => s.name);
                this.updateNetworkGraph(compilation.stocks, compilation.flows);

                const settings = rawYaml.settings || { startTime: 0, endTime: 12, dt: 0.1 };
                const t0 = performance.now();
                this.simulationData = this.runNetworkSimulation(compilation, settings);
                const t1 = performance.now();
                this.performanceText = `Расчёт RK4 завершен за ${(t1 - t0).toFixed(2)} мс. Сгенерировано точек: ${this.simulationData.length}`;

                this.evaluateBottlenecks(this.simulationData, settings.dt, compilation.stocks);
            } catch (e) {
                this.errors = [e.message];
            }
        },

        validateNetwork(yaml) {
            if (!yaml || !yaml.stocks || !yaml.flows)
                return { success: false, errors: ["Ошибка структуры: Нужны секции 'stocks' и 'flows'."] };

            const stockNames = new Set(yaml.stocks.map(s => s.name));
            stockNames.add("Внешний_Мир");
            const errs = [];
            const compiledFlows = [];
            const mathParser = new exprEval.Parser();

            mathParser.functions.PULSE = (vol, pTime) => Math.abs(currentT - pTime) < 0.0001 ? vol : 0;
            mathParser.functions.STEP = (h, sTime) => currentT >= sTime ? h : 0;
            mathParser.functions.IF = (cond, t, f) => cond ? t : f;
            mathParser.functions.MIN = Math.min;
            mathParser.functions.MAX = Math.max;

            for (let f of yaml.flows) {
                if (!stockNames.has(f.from))
                    errs.push(`Поток '${f.name}' указывает на ошибочный узел отправления: ${f.from}`);
                if (!stockNames.has(f.to))
                    errs.push(`Поток '${f.name}' указывает на ошибочный узел назначения: ${f.to}`);
                try {
                    compiledFlows.push({
                        name: f.name,
                        from: f.from,
                        to: f.to,
                        type: f.type || "Standard",
                        expr: f.type === "Transit_End" ? null : mathParser.parse(f.formula)
                    });
                } catch (e) {
                    errs.push(`Формула потока '${f.name}' синтаксически неверна: ${e.message}`);
                }
            }

            if (errs.length > 0) return { success: false, errors: errs };
            return { success: true, stocks: yaml.stocks, flows: compiledFlows };
        },

        updateNetworkGraph(stocks, flows) {
            this.cyInstance.elements().remove();
            stocks.forEach(s => {
                this.cyInstance.add({ data: { id: s.name, type: s.type } });
            });
            this.cyInstance.add({ data: { id: "Внешний_Мир", type: "Source" } });
            flows.forEach(f => {
                this.cyInstance.add({ data: { id: f.name, source: f.from, target: f.to, flowName: f.name } });
            });
            this.cyInstance.layout({ name: 'breadthfirst', directed: true, padding: 15 }).run();
        },

        runNetworkSimulation(compiled, settings) {
            const dt = settings.dt || 0.1;
            let state = {};
            let conveyors = {};

            compiled.stocks.forEach(s => {
                state[s.name] = s.initial;
                if (s.type === "Conveyor")
                    conveyors[s.name] = new ConveyorBuffer(s.transitTime, dt);
            });

            const timeline = [];
            let t = settings.startTime;

            const calcRates = (currState, currConveyors, currT) => {
                const rates = {};
                const context = { ...currState, t: currT };
                compiled.flows.forEach(f => {
                    if (f.type === "Transit_End") {
                        rates[f.name] = currConveyors[f.from] ? currConveyors[f.from].getReleaseAmount(currT) : 0;
                    } else {
                        rates[f.name] = f.expr.evaluate(context);
                    }
                });
                return rates;
            };

            const integrateDeltas = (targetState, rates, targetConveyors, targetT, coef) => {
                compiled.stocks.forEach(s => {
                    if (s.type === "Conveyor") {
                        const inFlows = compiled.flows.filter(f => f.to === s.name && f.type !== "Transit_End");
                        const totalInRate = inFlows.reduce((sum, f) => sum + rates[f.name], 0);
                        targetConveyors[s.name].push(totalInRate * coef, targetT);
                        const released = targetConveyors[s.name].getReleaseAmount(targetT + coef);
                        targetState[s.name] = Math.max(0, targetState[s.name] + (totalInRate * coef) - released);
                    } else {
                        const inFlows = compiled.flows.filter(f => f.to === s.name);
                        const outFlows = compiled.flows.filter(f => f.from === s.name);
                        const totalIn = inFlows.reduce((sum, f) => sum + rates[f.name], 0);
                        const totalOut = outFlows.reduce((sum, f) => sum + rates[f.name], 0);
                        targetState[s.name] = Math.max(0, targetState[s.name] + (totalIn - totalOut) * coef);
                    }
                });
            };

            while (t <= settings.endTime) {
                currentT = t;
                timeline.push({ time: t, state: { ...state } });

                const convK1 = {}; for(let k in conveyors) convK1[k] = conveyors[k].clone();
                const ratesK1 = calcRates(state, convK1, t);

                const stateK2 = { ...state };
                const convK2 = {}; for(let k in conveyors) convK2[k] = conveyors[k].clone();
                integrateDeltas(stateK2, ratesK1, convK2, t, dt * 0.5);
                const ratesK2 = calcRates(stateK2, convK2, t + dt * 0.5);

                const stateK3 = { ...state };
                const convK3 = {}; for(let k in conveyors) convK3[k] = conveyors[k].clone();
                integrateDeltas(stateK3, ratesK2, convK3, t, dt * 0.5);
                const ratesK3 = calcRates(stateK3, convK3, t + dt * 0.5);

                const stateK4 = { ...state };
                const convK4 = {}; for(let k in conveyors) convK4[k] = conveyors[k].clone();
                integrateDeltas(stateK4, ratesK3, convK4, t, dt);
                const ratesK4 = calcRates(stateK4, convK4, t + dt);

                compiled.stocks.forEach(stock => {
                    if (stock.type === "Conveyor") {
                        const inFlows = compiled.flows.filter(f => f.to === stock.name && f.type !== "Transit_End");
                        const weightedInRate = inFlows.reduce((sum, f) => sum + (ratesK1[f.name] + 2*ratesK2[f.name] + 2*ratesK3[f.name] + ratesK4[f.name]) / 6, 0);
                        conveyors[stock.name].push(weightedInRate * dt, t);
                        const actualOut = conveyors[stock.name].getReleaseAmount(t + dt);
                        state[stock.name] = Math.max(0, state[stock.name] + (weightedInRate * dt) - actualOut);
                    } else {
                        const inFlows = compiled.flows.filter(f => f.to === stock.name);
                        const outFlows = compiled.flows.filter(f => f.from === stock.name);
                        const weightedIn = inFlows.reduce((sum, f) => sum + (ratesK1[f.name] + 2*ratesK2[f.name] + 2*ratesK3[f.name] + ratesK4[f.name]) / 6, 0);
                        const weightedOut = outFlows.reduce((sum, f) => sum + (ratesK1[f.name] + 2*ratesK2[f.name] + 2*ratesK3[f.name] + ratesK4[f.name]) / 6, 0);
                        state[stock.name] = Math.max(0, state[stock.name] + (weightedIn - weightedOut) * dt);
                    }
                });

                t = Math.round((t + dt) * 10000) / 10000;
            }

            return timeline;
        },

        evaluateBottlenecks(data, dt, stocks) {
            let maxAvg = 0;
            let bottleneckStock = null;
            stocks.forEach(s => {
                if (s.type === "Stock") {
                    const avg = data.reduce((sum, r) => sum + (r.state[s.name] || 0), 0) / data.length;
                    if (avg > maxAvg) {
                        maxAvg = avg;
                        bottleneckStock = s;
                    }
                }
            });

            if (!bottleneckStock) {
                this.bottleneckAnalysis = `<div class="text-[#a6e3a1] font-bold">✨ Нет накопителей для анализа.</div>`;
                return;
            }

            const peak = data.reduce((max, r) => Math.max(max, r.state[bottleneckStock.name] || 0), 0);
            const threshold = peak * 0.75;
            let overflowHours = 0;
            data.forEach(r => {
                if ((r.state[bottleneckStock.name] || 0) > threshold) overflowHours += dt;
            });

            let report = `<div class="font-bold text-[#f9e2af] mb-1">📈 Бизнес-метрики логистического хаба:</div>`;
            report += `<div>• Пиковая загрузка в «${bottleneckStock.name}»: <span class="text-[#cba6f7] font-bold">${peak.toFixed(0)} ед.</span></div>`;
            if (overflowHours > 0) {
                report += `<div class="text-[#f38ba8] font-bold mt-1">⚠️ Затор! Накопитель превышает 75% пиковой загрузки в течение ${overflowHours.toFixed(2)} ч. Увеличьте пропускную способность.</div>`;
            } else {
                report += `<div class="text-[#a6e3a1] font-bold mt-1">✅ Система сбалансирована. Узких мест не обнаружено.</div>`;
            }
            this.bottleneckAnalysis = report;
        }
    };
}
</script>

</body>
</html>
